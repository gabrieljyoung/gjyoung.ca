<!DOCTYPE html>
<html>
    <head>
        <title>Gabriel J. Young</title>
    </head>

    <body>
        <main class='desktop'>
            <img class='free-parking' src='free-parking.png'/>
            <img class='title' src='title.png'/>
            <div class='icons'>
                <a href='https://github.com/gabrieljyoung'><img class='icon' src='github.png'></a>
                <a href='https://www.linkedin.com/in/gj-young/'><img class='icon' src='linkedin.png'/></a>
            </div>
        </main>
        <main class='mobile'>
            <img class='free-parking' src='free-parking.png'/>
            <img class='title' src='title.png'/>
            <div class='icons'>
                <a href='https://github.com/gabrieljyoung'><img class='icon' src='github.png'></a>
                <a href='https://www.linkedin.com/in/gj-young/'><img class='icon' src='linkedin.png'/></a>
            </div>
        </main>
    </body>
</html>

<style media='all'>

    html {
        height: -webkit-fill-available;
    }

    body {
        min-height: 100vh;
        min-height: -webkit-fill-available;

        position: fixed;
        top: 0;
        left: 0;
        margin: 0;

        background-color: black;
    }

    main.desktop {
        height: 200px;
        width: 600px;

        position: fixed;
        top: calc(50vh - 100px);
        left: calc(50vw - 300px);
        
        display: grid;
        grid-template-columns: 200px 380px;
        grid-template-rows: 130px 70px;
        column-gap: 20px;
    }

    main.desktop img.free-parking {
        grid-row: 1 / 3;
        max-height: 100%;
        max-width: 100%;
    }

    main.desktop img.title {
        max-height: 100%;
        max-width: 100%;
    }

    main.desktop div.icons {
        max-height: 100%;
        max-width: 100%;
        padding-top: 20px;
        padding-bottom: 10px;
        text-align: center;
    }

    main.desktop img.icon {
        display: inline;
        height: 40px;
        margin: 0 8px;
    }

    main.mobile {
        display: none;
    }

    main.mobile [class *= 'free-parking'] {
        display: block;
    }

    main.mobile img.free-parking {
        max-width: 80%;
        margin: 5% 10%;
    }

    main.mobile img.title {
        max-width: 100%;
    }

    main.mobile div.icons {
        max-width: 100%;
        padding-top: 60px;
        padding-bottom: 30px;
        text-align: center;
    }

    main.mobile img.icon {
        display: inline;
        height: 100px;
        margin: 0 20px;
    }

    @media (max-device-width: 800px) {
        main.desktop { display: none }
        main.mobile { 
            display: block;

            height: 80vh;
            width: 80vw;

            position: fixed;
            top: 10vh;
            left: 10vw;
        }
    }

</style>
